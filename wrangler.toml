[triggers]
crons = ["*/5 * * * *"]

[vars]
AUTH_PUBLIC_KEY_PEM = "-----BEGIN PUBLIC KEY----------END PUBLIC KEY-----"

[[d1_databases]]
binding = "DB"
database_name = "sehun"
database_id = "05d69ada-ed2f-46cf-b90b-514f60852e99"
migrations_dir = "migrations"
